theme = "onelight"

[editor]
line-number = "relative"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[keys.insert]
"C-a" = "goto_line_start"
"C-e" = "goto_line_end_newline"
"C-b" = "move_char_left"
"C-f" = "move_char_right"
"A-b" = "move_prev_word_start"
"A-f" = "move_next_word_start"
"C-d" = "delete_char_forward"
