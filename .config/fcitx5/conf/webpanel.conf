[Basic]
# Follow caret
FollowCaret=False
# Theme
Theme=System
# Default theme
DefaultTheme=System

[LightMode]
# Override default
OverrideDefault=False
# Highlight color
HighlightColor=#0000ff
# Highlight color on hover
HighlightHoverColor=#00007f
# Highlight text color
HighlightTextColor=#ffffff
# Highlight text color on press
HighlightTextPressColor=#7f7f7f
# Highlight label color
HighlightLabelColor=#ffffff
# Highlight comment color
HighlightCommentColor=#ffffff
# Highlight mark color
HighlightMarkColor=#ffffff
# Panel color
PanelColor=#ffffff
# Text color
TextColor=#000000
# Label color
LabelColor=#000000
# Comment color
CommentColor=#000000
# Paging button color
PagingButtonColor=#000000
# Disabled paging button color
DisabledPagingButtonColor=#7f7f7f
# Indicator text color
AuxColor=#000000
# Preedit color pre-caret
PreeditColorPreCaret=#000000
# Preedit caret color
PreeditColorCaret=#000000
# Preedit color post-caret
PreeditColorPostCaret=#000000
# Border color
BorderColor=#000000
# Divider color
DividerColor=#000000

[DarkMode]
# Override default
OverrideDefault=False
# Same with light mode
SameWithLightMode=False
# Highlight color
HighlightColor=#0000ff
# Highlight color on hover
HighlightHoverColor=#00007f
# Highlight text color
HighlightTextColor=#ffffff
# Highlight text color on press
HighlightTextPressColor=#7f7f7f
# Highlight label color
HighlightLabelColor=#ffffff
# Highlight comment color
HighlightCommentColor=#ffffff
# Highlight mark color
HighlightMarkColor=#ffffff
# Panel color
PanelColor=#000000
# Text color
TextColor=#ffffff
# Label color
LabelColor=#ffffff
# Comment color
CommentColor=#ffffff
# Paging button color
PagingButtonColor=#ffffff
# Disabled paging button color
DisabledPagingButtonColor=#7f7f7f
# Indicator text color
AuxColor=#ffffff
# Preedit color pre-caret
PreeditColorPreCaret=#ffffff
# Preedit caret color
PreeditColorCaret=#ffffff
# Preedit color post-caret
PreeditColorPostCaret=#ffffff
# Border color
BorderColor=#ffffff
# Divider color
DividerColor=#ffffff

[Typography]
# Layout
Layout=Horizontal
# Writing mode
WritingMode="Horizontal top-bottom"
# Typography awareness for IM
TypographyAwarenessForIM=True
# Vertical comments align right
VerticalCommentsAlignRight=False
# Paging buttons style
PagingButtonsStyle=Arrow

[ScrollMode]
# Enable scroll
EnableScroll=True
# Auto expand
AutoExpand=False
# Show scroll bar
ShowScrollBar=True
# Animation
Animation=True
# Max row count
MaxRowCount=6
# Max column count
MaxColumnCount=8
# Select candidate
SelectCandidate=
# Use main keyboard number keys to select candidate
UseMainKeyboardNumberKeys=True
# Use keypad number keys to select candidate
UseKeypadNumberKeys=False
# Optimize for Hyper key
OptimizeForHyperKey=True

[ScrollMode/Expand]
0=equal
1=Down

[ScrollMode/Collapse]
0=minus

[ScrollMode/Up]
0=minus
1=Up

[ScrollMode/Down]
0=equal
1=Down

[ScrollMode/Left]
0=Left

[ScrollMode/Right]
0=Right

[ScrollMode/RowStart]
0=Home

[ScrollMode/RowEnd]
0=End

[ScrollMode/PageUp]
0=Page_Up

[ScrollMode/PageDown]
0=Next

[ScrollMode/Commit]
0=space

[Background]
# Image
ImageUrl=
# Keep panel color when has image
KeepPanelColorWhenHasImage=False
# Blur
Blur=System
# Shadow
Shadow=True

[Font]
# Text font size
TextFontSize=16
# Text font weight
TextFontWeight=400
# Label font size
LabelFontSize=12
# Label font weight
LabelFontWeight=400
# Comment font size
CommentFontSize=12
# Comment font weight
CommentFontWeight=400
# Preedit font size
PreeditFontSize=16
# Preedit font weight
PreeditFontWeight=400

[Font/TextFontFamily]
0=

[Font/LabelFontFamily]
0=

[Font/CommentFontFamily]
0=

[Font/PreeditFontFamily]
0=

[Caret]
# Style
Style=Blink
# Text
Text=‸

[Highlight]
# Mark style
MarkStyle=None
# Mark text
MarkText=🐧
# Hover behavior
HoverBehavior=None

[Size]
# Override default
OverrideDefault=True
# Border width (px)
BorderWidth=0
# Border radius (px)
BorderRadius=7
# Margin (px)
Margin=0
# Highlight radius (px)
HighlightRadius=0
# Top padding (px)
TopPadding=3
# Right padding (px)
RightPadding=7
# Bottom padding (px)
BottomPadding=3
# Left padding (px)
LeftPadding=7
# Gap between label, text and comment (px)
LabelTextGap=6
# Vertical minimum width (px)
VerticalMinWidth=200
# Scroll cell width (px)
ScrollCellWidth=65
# Horizontal divider width (px)
HorizontalDividerWidth=1

[Advanced]
# User CSS
UserCss=
# Copy HTML
CopyHtml=
# I know there may be risks for using plugins
PluginNotice=False
# Plugins
Plugins=

[Advanced/UnsafeAPI]
# curl
EnableUnsafeCurlAPI=False

